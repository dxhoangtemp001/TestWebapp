name: Deploy to GitHub Pages

on:
  # Chạy khi có push vào branch main
  push:
    branches: [ "main" ]
  
  # Cho phép chạy workflow thủ công từ Actions tab
  workflow_dispatch:

# Thiết lập quyền GITHUB_TOKEN để deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép một deployment chạy cùng lúc, hủy các deployment đang chờ
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job để build và upload artifacts
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload toàn bộ repository
          path: '.'

  # Job để deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4