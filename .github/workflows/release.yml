name: 🏷️ Create Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger khi push tag version (ví dụ: v1.0.0)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
          echo "📦 Creating release for version: ${{ steps.version.outputs.version }}"

      - name: 📊 Generate changelog
        id: changelog
        run: |
          echo "📊 Generating changelog..."
          
          # Lấy commit messages từ tag trước đó
          if git describe --tags --abbrev=0 HEAD~1 >/dev/null 2>&1; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1)
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD)
          else
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s" --max-count=10)
          fi
          
          # Tạo changelog
          cat > CHANGELOG.md << EOF
          # 🚀 Release ${{ steps.version.outputs.version }}
          
          ## ✨ New Features
          $COMMITS
          
          ## 📦 Files included
          - \`index.html\` - Main HTML file
          - \`style.css\` - Styles and animations
          - \`script.js\` - Interactive functionality
          - \`README.md\` - Documentation
          
          ## 🌐 Live Demo
          Visit: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          
          ## 📱 Features
          - 🎨 Beautiful animations and effects
          - 📱 Responsive design
          - ⚡ Interactive elements
          - 🌟 Modern UI/UX
          
          ---
          *Generated automatically on $(date)*
          EOF
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📦 Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: 🚀 Release ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: 📤 Upload release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./index.html
          asset_name: index.html
          asset_content_type: text/html

      - name: 📤 Upload CSS
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./style.css
          asset_name: style.css
          asset_content_type: text/css

      - name: 📤 Upload JavaScript
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./script.js
          asset_name: script.js
          asset_content_type: application/javascript

      - name: 📤 Upload README
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./README.md
          asset_name: README.md
          asset_content_type: text/markdown

      - name: 🎉 Release created
        run: |
          echo "🎉 Release ${{ steps.version.outputs.version }} created successfully!"
          echo "🌐 Live demo: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "📦 Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"